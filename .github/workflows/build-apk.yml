name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Web Assets
        run: |
          npm install
          npm run build

      - name: Setup Capacitor & Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Cricket App" "com.cricket.scorer" --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Force Single Kotlin Version & Compile
        run: |
          cd android
          
          # Force AndroidX configurations
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # Inject a global resolution strategy into the root build.gradle file to kill duplicates
          sed -i '/allprojects {/a \    subprojects {\n        project.configurations.all {\n            resolutionStrategy.eachDependency { details ->\n                if (details.requested.group == "org.jetbrains.kotlin") {\n                    details.useVersion "1.9.22"\n                }\n            }\n        }\n    }' build.gradle
          
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Neighbor-cart-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
