name: Create Build APK

on:
  push:
    branches: [ main ] # Change this to your default branch name if it's different (e.g., master)
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code from your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '20' # You can specify your preferred Node version here
          cache: 'npm'
          cache-dependency-path: './Neighbour-cart/package-lock.json'

      # Step 3: Install & Build Web Assets (This is where the fix is applied)
      - name: Install & Build Web Assets
        # This tells GitHub to run the commands inside your subfolder
        working-directory: ./Neighbour-cart
        run: |
          npm install
          npm run build --if-present

      # Step 4: Set up JDK (Java Development Kit) for Android bundling
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # or 'temurin'
          java-version: '21'

      # Step 5: Set up Capacitor & Android build
      - name: Setup Capacitor & Android
        working-directory: ./Neighbour-cart
        run: |
          npm install @capacitor/cli @capacitor/core
          npx cap sync
          # Add your Android build commands below (e.g., cd android && ./gradlew assembleDebug)
          
